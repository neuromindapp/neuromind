services:
  caddy:
    build:
      context: .
      dockerfile: caddy/Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_PRIVY_APP_ID: ${PRIVY_APP_ID:-}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - caddy_data:/data
      - caddy_config:/config

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - server.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 20s
      timeout: 5s
      retries: 5

  scanner:
    build: ./scanner
    restart: unless-stopped
    env_file:
      - server.env
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: neuromind
      POSTGRES_USER: neuromind
      POSTGRES_PASSWORD: neuromind
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neuromind -d neuromind"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
